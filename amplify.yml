version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .svelte-kit/output
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .svelte-kit/**/*
  - backend:
      phases:
        build:
          commands:
            - '# Execute Amplify CLI with the helper script'
            - amplifyPush --simple 